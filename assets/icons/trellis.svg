      <rect x="94" y="28" width="6" height="62" rx="2" transform="rotate(28 97 59)"/>
      <rect x="22" y="28" width="6" height="62" rx="2" transform="rotate(-28 25 59)"/>
      <rect x="46" y="22" width="6" height="68" rx="2" transform="rotate(-28 49 56)"/>
      <rect x="70" y="22" width="6" height="68" rx="2" transform="rotate(-28 73 56)"/>
