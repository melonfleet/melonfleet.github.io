<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512" role="img" aria-label="Trellis app icon — lattice trellis with climbing vine">
  <defs><clipPath id="squircle"><rect x="0" y="0" width="120" height="120" rx="27"/></clipPath></defs>
  <g clip-path="url(#squircle)">
    <rect x="0" y="0" width="120" height="120" fill="#A7D98C"/>
    <rect x="0" y="96" width="120" height="24" fill="#1B5E20"/>
    <rect x="0" y="90" width="120" height="6" fill="#FFFFFF"/>
    <!-- filled lattice bars (trellis) -->
