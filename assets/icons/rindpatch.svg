<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="512" height="512" role="img" aria-label="RindPatch app icon — watermelon rind with bandage patch">
  <defs><clipPath id="squircle"><rect x="0" y="0" width="120" height="120" rx="27"/></clipPath></defs>
  <g clip-path="url(#squircle)">
    <rect x="0" y="0" width="120" height="120" fill="#FC4A6B"/>
    <rect x="0" y="96" width="120" height="24" fill="#1B5E20"/>
    <rect x="0" y="90" width="120" height="6" fill="#FFFFFF"/>
    <!-- rind arc (watermelon skin segment) -->
    <path d="M18 78 C22 36, 98 36, 102 78 L92 78 C88 48, 32 48, 28 78 Z" fill="#1B5E20"/>
    <path d="M28 78 C32 52, 88 52, 92 78 L84 78 C80 60, 40 60, 36 78 Z" fill="#FFFFFF"/>
    <path d="M36 78 C40 64, 80 64, 84 78 L76 78 C72 70, 48 70, 44 78 Z" fill="#E63956"/>
    <!-- seeds on flesh -->
    <ellipse cx="52" cy="72" rx="2" ry="3" fill="#241F1A" transform="rotate(-20 52 72)"/>
    <ellipse cx="68" cy="70" rx="2" ry="3" fill="#241F1A" transform="rotate(15 68 70)"/>
    <!-- bandage / patch -->
    <g transform="translate(60,50) rotate(-28)">
      <rect x="-28" y="-10" width="56" height="20" rx="4" fill="#FBF7F0"/>
      <rect x="-28" y="-10" width="10" height="20" rx="3" fill="#EDE6DA"/>
      <rect x="18" y="-10" width="10" height="20" rx="3" fill="#EDE6DA"/>
      <rect x="-6" y="-10" width="5" height="20" fill="#FC4A6B"/>
      <rect x="2" y="-10" width="5" height="20" fill="#FC4A6B"/>
    </g>
  </g>
</svg>
